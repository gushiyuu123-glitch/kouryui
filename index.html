<!doctype html>
<html lang="ja">
  <head>
    <!-- =========================================
      KOU RYUI / index.html (Vite)
      - 最小で強い入口
      - 世界観：紙 / 墨 / 紅
    ========================================== -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Google翻訳を完全無効化（言語トーン保護） -->
    <meta name="google" content="notranslate" />

    <!-- Title / Description（※あとで本番文に差し替え推奨） -->
    <title>KOU RYUI｜紅琉衣</title>
    <meta
      name="description"
      content="那覇・国際通りエリア｜琉球衣装レンタル（着付け込み・手ぶらOK）。迷ったまま送ってください。返信で当日の動きまで整えます。"
    />

    <!-- Theme / UI Colors -->
    <!-- light前提。iOS/Androidのアドレスバー色が“紙”になる -->
    <meta name="theme-color" content="#FAF8F4" />
    <meta name="color-scheme" content="light" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PNGも用意できるなら推奨（Safari対策） -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Optional: PWA（必要なら） -->
    <!-- <link rel="manifest" href="/site.webmanifest" /> -->

    <!-- OGP / Twitter -->
    <!-- ※ image はあなたのOGP実ファイルに合わせて -->
    <meta property="og:site_name" content="KOU RYUI｜紅琉衣" />
    <meta property="og:title" content="KOU RYUI｜紅琉衣" />
    <meta
      property="og:description"
      content="那覇・国際通りエリア｜琉球衣装レンタル（着付け込み・手ぶらOK）。迷ったまま送ってください。返信で当日の動きまで整えます。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="/ogp.png" />
    <meta property="og:image:alt" content="KOU RYUI｜紅琉衣" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KOU RYUI｜紅琉衣" />
    <meta
      name="twitter:description"
      content="那覇・国際通りエリア｜琉球衣装レンタル（着付け込み・手ぶらOK）。"
    />
    <meta name="twitter:image" content="/ogp.png" />

    <!-- Preload hints（外部フォント無し前提で最小） -->
    <link rel="preload" as="image" href="/hero1-16x9.png" />
  </head>

  <body>
    <noscript>このサイトの表示には JavaScript が必要です。</noscript>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
